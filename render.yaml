services:
  # ── API Node.js ─────────────────────────────────
  - type: web
    name: mam-buudu-api
    env: node
    region: frankfurt          # plus proche de l'Afrique de l'Ouest que Oregon
    plan: free
    buildCommand: npm run prisma:generate && npm run build && npm run prisma:migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true    # Render génère une valeur aléatoire automatiquement
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: API_BASE_URL
        value: https://mam-buudu-api.onrender.com



